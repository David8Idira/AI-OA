spring:
  application:
    name: ai-oa
  datasource:
    url: jdbc:mysql://localhost:3306/ai_oa?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.aioa: DEBUG
    org.hibernate.SQL: DEBUG
