version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: aioa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: aioa
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
  
  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: aioa-redis
    ports:
      - "6379:6379"
  
  # AI-OA后端
  backend:
    build: .
    container_name: aioa-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aioa
      SPRING_REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
  
  # 前端
  frontend:
    image: nginx:alpine
    container_name: aioa-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql-data: