server:
  port: 8082

spring:
  application:
    name: aioa-ocr-test

  # Use H2 for testing
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  # Redis mock configuration
  data:
    redis:
      host: localhost
      port: 6379

  # Disable auto-configuration for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# AIOA OCR Configuration for tests
aioa:
  ocr:
    aliyun:
      enabled: false
      access-key-id: test-key
      access-key-secret: test-secret
      confidence-threshold: 0.8
      enable-cache: false

# Logging
logging:
  level:
    com.aioa.ocr: DEBUG
