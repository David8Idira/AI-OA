server:
  port: 8084

spring:
  application:
    name: aioa-report
  datasource:
    url: jdbc:mysql://localhost:3306/ai_oa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aioa.report.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

aioa:
  report:
    export-path: /tmp/reports
    ai-model: gpt-4o

logging:
  level:
    com.aioa.report: debug
