aioa:
  ai:
    # Mimo配置
    mimo:
      enabled: true
      api-key: tp-cl8gb60kvi9ieqdkwk7gfopb579cem3jw75dum8sfom2egu8
      endpoint: https://api.minimax.chat/v1/text/chatcompletion_pro
      model: mimo-v2-flash
      temperature: 0.7
      max-tokens: 2048
    
    # OpenAI配置
    openai:
      enabled: false
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
    
    # Claude配置
    claude:
      enabled: false
      api-key: ${CLAUDE_API_KEY:}
      model: claude-3-5-sonnet-20241022

# 邮件配置
spring:
  application:
    name: aioa-ai
  
  datasource:
    url: jdbc:mysql://localhost:3306/ai_oa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  mail:
    host: smtp.example.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aioa.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.aioa.ai: debug