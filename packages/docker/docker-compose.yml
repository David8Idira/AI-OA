version: '3.8'

services:
  # ============================================================
  # MySQL Database
  # ============================================================
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile.mysql
    container_name: aioa-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123456}
      MYSQL_DATABASE: ai_oa
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - aioa-network

  # ============================================================
  # Redis Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: aioa-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aioa-network

  # ============================================================
  # Backend Microservices
  # Each service is built from the Spring Boot multi-stage Dockerfile
  # ============================================================

  aioa-gateway:
    build:
      context: ${BACKEND_SOURCE:-../../source/backend}
      dockerfile: ${DOCKERFILE_PATH:-./Dockerfile.app}
      args:
        MODULE: aioa-gateway
        JAR_NAME: aioa-gateway
    container_name: aioa-gateway
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-dev}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_oa
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-aioa-jwt-secret-key-for-signing-tokens-must-be-at-least-256-bits-long}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aioa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  aioa-system:
    build:
      context: ${BACKEND_SOURCE:-../../source/backend}
      dockerfile: ${DOCKERFILE_PATH:-./Dockerfile.app}
      args:
        MODULE: aioa-system
        JAR_NAME: aioa-system
    container_name: aioa-system
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-dev}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_oa
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aioa-network

  aioa-workflow:
