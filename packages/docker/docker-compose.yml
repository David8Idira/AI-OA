version: '3.8'

services:
  # ============================================================
  # Kingbase Database (金仓数据库)
  # ============================================================
  kingbase:
    image: kingbase:v9.1
    container_name: aioa-kingbase
    restart: always
    environment:
      KINGBASE_PASSWORD: ${DB_PASSWORD:-root123456}
      KINGBASE_DATABASE: ai_oa
    ports:
      - "${DB_PORT:-54321}:54321"
    volumes:
      - kingbase_data:/var/lib/kingbase
      - ./kingbase/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54321"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - aioa-network

  # ============================================================
  # Redis Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: aioa-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aioa-network

  # ============================================================
  # RabbitMQ Message Queue (单消息队列)
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aioa-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aioa-network

  # ============================================================
  # Backend Microservices
  # Each service is built from the Spring Boot multi-stage Dockerfile
  # ============================================================

  aioa-gateway:
    build:
      context: ${BACKEND_SOURCE:-../../source/backend}
      dockerfile: ${DOCKERFILE_PATH:-./Dockerfile.app}
      args:
        MODULE: aioa-gateway
        JAR_NAME: aioa-gateway
    container_name: aioa-gateway
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-dev}
      DB_HOST: kingbase
      DB_PORT: 54321
      DB_NAME: ai_oa
      DB_USERNAME: system
      DB_PASSWORD: ${DB_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-aioa-jwt-secret-key-for-signing-tokens-must-be-at-least-256-bits-long}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      kingbase:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - aioa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  aioa-system:
    build:
      context: ${BACKEND_SOURCE:-../../source/backend}
      dockerfile: ${DOCKERFILE_PATH:-./Dockerfile.app}
