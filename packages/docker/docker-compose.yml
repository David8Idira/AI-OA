  # ============================================================
  # Frontend - Vue 3 SPA
  # ============================================================
  frontend:
    image: nginx:alpine
    container_name: aioa-frontend
    restart: always
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ${FRONTEND_DIST_PATH:-../../source/frontend/dist}:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - aioa-gateway
    networks:
      - aioa-network

  # ============================================================
  # Nginx Reverse Proxy (API Gateway & Static Assets)
  # All backend services are exposed through Nginx
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: aioa-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - aioa-gateway
      - aioa-system
      - aioa-workflow
      - aioa-knowledge
      - aioa-ai
      - aioa-asset
      - aioa-attendance
      - aioa-hr
      - aioa-license
      - aioa-ocr
      - aioa-reimburse
      - aioa-report
      - aioa-im
    networks:
      - aioa-network

# ============================================================
# Networks
# ============================================================
networks:
  aioa-network:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
