# ============================================================
# AI-OA Nginx Reverse Proxy Configuration
# Acts as unified API gateway routing to all microservices
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml application/xml+rss
               application/x-javascript text/javascript;

    # ── Proxy Settings ────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Disable proxy_request_buffering for large file uploads
    proxy_request_buffering off;
    proxy_buffering off;

    # ── Rate Limiting ─────────────────────────────────────────
    # Defined in conf.d/ratelimit.conf

    # ── Upstream Backend Services ─────────────────────────────
    upstream aioa-gateway {
        server aioa-gateway:8080;
        keepalive 32;
    }

    upstream aioa-system {
        server aioa-system:8081;
        keepalive 32;
    }

    upstream aioa-workflow {
        server aioa-workflow:8082;
        keepalive 32;
    }

    upstream aioa-knowledge {
        server aioa-knowledge:8083;
        keepalive 32;
    }

    upstream aioa-ai {
        server aioa-ai:8084;
        keepalive 32;
    }

    upstream aioa-asset {
        server aioa-asset:8085;
        keepalive 32;
    }

    upstream aioa-attendance {
        server aioa-attendance:8086;
        keepalive 32;
    }

    upstream aioa-hr {
        server aioa-hr:8087;
        keepalive 32;
    }

    upstream aioa-license {
        server aioa-license:8088;
        keepalive 32;
    }

    upstream aioa-ocr {
        server aioa-ocr:8089;
        keepalive 32;
    }

    upstream aioa-reimburse {
        server aioa-reimburse:8090;
        keepalive 32;
    }

    upstream aioa-report {
        server aioa-report:8091;
        keepalive 32;
    }

    upstream aioa-im {
        server aioa-im:8092;
        keepalive 32;
    }

    upstream aioa-frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Server Block ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ── API Routes ────────────────────────────────────────
        # Gateway / Auth routes
        location /api/auth/ {
            proxy_pass http://aioa-gateway/api/auth/;
            proxy_read_timeout 60s;
        }

        # System management service
        location /api/system/ {
            proxy_pass http://aioa-system/api/system/;
            proxy_read_timeout 60s;
        }

        # Workflow service
        location /api/workflow/ {
            proxy_pass http://aioa-workflow/api/workflow/;
            proxy_read_timeout 120s;
        }

        # Knowledge base service
        location /api/knowledge/ {
            proxy_pass http://aioa-knowledge/api/knowledge/;
            proxy_read_timeout 90s;
        }

        # AI service (chat, LLM calls)
        location /api/ai/ {
            proxy_pass http://aioa-ai/api/ai/;
            proxy_read_timeout 300s;  # LLM calls can be slow
        }

        # Asset management
        location /api/asset/ {
            proxy_pass http://aioa-asset/api/asset/;
            proxy_read_timeout 60s;
        }

        # Attendance
        location /api/attendance/ {
            proxy_pass http://aioa-attendance/api/attendance/;
            proxy_read_timeout 60s;
        }

        # HR service
        location /api/hr/ {
            proxy_pass http://aioa-hr/api/hr/;
            proxy_read_timeout 60s;
        }

        # License management
        location /api/license/ {
            proxy_pass http://aioa-license/api/license/;
            proxy_read_timeout 60s;
        }

        # OCR service
        location /api/ocr/ {
            proxy_pass http://aioa-ocr/api/ocr/;
            proxy_read_timeout 120s;  # OCR can be slow
        }

        # Reimburse service
        location /api/reimburse/ {
            proxy_pass http://aioa-reimburse/api/reimburse/;
            proxy_read_timeout 60s;
        }

        # Report service
        location /api/report/ {
            proxy_pass http://aioa-report/api/report/;
            proxy_read_timeout 120s;  # Report generation can be slow
        }

        # IM (Instant Messaging)
        location /api/im/ {
            proxy_pass http://aioa-im/api/im/;
            proxy_read_timeout 30s;
        }

        # WebSocket support for IM
        location /ws/ {
            proxy_pass http://aioa-im/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Actuator Health Checks ─────────────────────────────
        location /actuator/ {
            proxy_pass http://aioa-gateway/actuator/;
            proxy_read_timeout 10s;
        }

        # ── Static Frontend ────────────────────────────────────
        location / {
            proxy_pass http://aioa-frontend/;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Error Pages ────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ── HTTPS Server (SSL) ────────────────────────────────────
    # Uncomment and configure for HTTPS
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #
    #     # Include all location blocks from HTTP server above...
    # }
}
