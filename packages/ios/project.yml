name: AiOA
options:
  bundleIdPrefix: com.company
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AiOA:
    type: application
    platform: iOS
    sources:
      - path: AiOA
        excludes:
          - "**/*.xcassets"
      - path: AiOA/Resources/Assets.xcassets
        type: folder
    resources:
      - path: AiOA/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: AiOA/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.company.ai-oa
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    entitlements:
      path: AiOA/AiOA.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.company.ai-oa"
    preBuildScripts: []
    postBuildScripts: []

schemes:
  AiOA:
    build:
      targets:
        AiOA: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
