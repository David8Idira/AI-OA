apiVersion: apps/v1
kind: Deployment
metadata:
  name: aioa-ai
  namespace: ai-oa
  labels:
    app: aioa-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aioa-ai
  template:
    metadata:
      labels:
        app: aioa-ai
    spec:
      containers:
        - name: ai
          image: aioa-ai:latest
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: REDIS_PASSWORD
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: JAVA_OPTS
            - name: MIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: MIMI_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: OPENAI_API_KEY
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: CLAUDE_API_KEY
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aioa-ai
  namespace: ai-oa
spec:
  type: ClusterIP
  selector:
    app: aioa-ai
  ports:
    - port: 8084
      targetPort: 8084
      name: ai
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aioa-ai-hpa
  namespace: ai-oa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aioa-ai
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80