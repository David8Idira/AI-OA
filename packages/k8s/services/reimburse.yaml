apiVersion: apps/v1
kind: Deployment
metadata:
  name: aioa-reimburse
  namespace: ai-oa
  labels:
    app: aioa-reimburse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aioa-reimburse
  template:
    metadata:
      labels:
        app: aioa-reimburse
    spec:
      containers:
        - name: reimburse
          image: aioa-reimburse:latest
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-oa-secret
                  key: REDIS_PASSWORD
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: ai-oa-config
                  key: JAVA_OPTS
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aioa-reimburse
  namespace: ai-oa
spec:
  type: ClusterIP
  selector:
    app: aioa-reimburse
  ports:
    - port: 8090
      targetPort: 8090
      name: reimburse
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aioa-reimburse-hpa
  namespace: ai-oa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aioa-reimburse
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80