apiVersion: apps/v1
kind: Deployment
metadata:
  name: aioa-frontend
  namespace: ai-oa
  labels:
    app: aioa-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aioa-frontend
  template:
    metadata:
      labels:
        app: aioa-frontend
    spec:
      containers:
        - name: frontend
          image: aioa-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aioa-frontend
  namespace: ai-oa
spec:
  type: ClusterIP
  selector:
    app: aioa-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aioa-frontend-hpa
  namespace: ai-oa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aioa-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80